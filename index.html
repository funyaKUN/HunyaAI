<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HunyaCodingAI - マルチレイヤーAIコード生成システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-panel, .discussion-panel, .code-panel, .status-panel, .chat-panel, .data-panel, .update-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
            animation: fadeIn 0.6s ease-out;
        }

        .input-panel {
            animation-delay: 0.1s;
        }

        .discussion-panel {
            grid-column: 2;
            grid-row: 1 / 3;
            animation-delay: 0.2s;
        }

        .code-panel {
            animation-delay: 0.3s;
        }

        .status-panel {
            animation-delay: 0.4s;
        }

        .chat-panel {
            grid-column: 1;
            animation-delay: 0.5s;
            max-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .data-panel {
            animation-delay: 0.6s;
        }

        .update-panel {
            animation-delay: 0.7s;
        }

        h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .config-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .discussion-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            animation: slideInLeft 0.4s ease-out;
            font-size: 0.9em;
        }

        .discussion-item.gemini {
            border-left-color: #ea4335;
        }

        .discussion-item.openai {
            border-left-color: #10a37f;
        }

        .discussion-item.custom {
            border-left-color: #764ba2;
        }

        .discussion-item.summary {
            border-left-color: #f7b801;
            background: #fffbf0;
        }

        .ai-name {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.85em;
        }

        .discussion-item.gemini .ai-name {
            color: #ea4335;
        }

        .discussion-item.openai .ai-name {
            color: #10a37f;
        }

        .discussion-item.custom .ai-name {
            color: #764ba2;
        }

        .discussion-item.summary .ai-name {
            color: #f7b801;
        }

        .discussion-content {
            color: #555;
            font-size: 0.9em;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
        }

        .discussion-scroll {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .code-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .code-output code {
            color: #d4d4d4;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .status-indicator.pending {
            background: #ffc107;
            animation: pulse 1.5s infinite;
        }

        .status-indicator.success {
            background: #28a745;
        }

        .status-indicator.error {
            background: #dc3545;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        /* Chat Interface Styles */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            background: #f8f9fa;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
            animation: slideInLeft 0.3s ease-out;
        }

        .chat-message.user {
            background: #e3f2fd;
            text-align: right;
            color: #1565c0;
        }

        .chat-message.ai {
            background: #f3e5f5;
            text-align: left;
            color: #6a1b9a;
        }

        .chat-message.system {
            background: #fff3e0;
            text-align: center;
            color: #e65100;
            font-size: 0.85em;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
        }

        .chat-input-group input {
            flex: 1;
        }

        .chat-input-group button {
            width: 40px;
            padding: 12px;
        }

        /* Data Panel Styles */
        .data-source-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .data-source-btn {
            padding: 10px;
            background: #e0e0e0;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .data-source-btn.active {
            background: #667eea;
            color: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        .data-table th, .data-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table th {
            background: #667eea;
            color: white;
        }

        /* Update Panel Styles */
        .update-status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .update-status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .update-status.success {
            background: #d4edda;
            color: #155724;
        }

        .update-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .test-result {
            padding: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .test-result.pass {
            border-left-color: #28a745;
        }

        .test-result.fail {
            border-left-color: #dc3545;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .download-section {
            text-align: center;
            margin-top: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .download-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .discussion-panel {
                grid-column: 1;
                grid-row: auto;
            }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .cycle-counter {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .thinking-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #764ba2;
            margin-right: 5px;
            animation: thinkingPulse 0.6s infinite;
        }

        @keyframes thinkingPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 10px 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 HunyaCodingAI</h1>
            <p>マルチレイヤーAIシステム - 完全クライアントサイド実装（自動更新・チャット・データ収集対応）</p>
        </header>

        <div class="main-grid">
            <!-- 左パネル：入力 -->
            <div class="input-panel">
                <h2>📝 リクエスト入力</h2>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <div class="form-group">
                    <label for="userRequest">プロジェクト説明</label>
                    <textarea id="userRequest" placeholder="例: Minecraftのスポーン位置管理プラグインを作りたい&#10;ユーザーがコマンドで好きな位置をセット&#10;データは永続化して欲しい"></textarea>
                </div>

                <div class="form-group">
                    <label for="language">プログラミング言語</label>
                    <select id="language">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                        <option value="typescript">TypeScript</option>
                        <option value="csharp">C#</option>
                        <option value="cpp">C++</option>
                    </select>
                </div>

                <div class="config-group">
                    <div class="form-group">
                        <label for="geminiKey">Gemini API Key</label>
                        <input type="password" id="geminiKey" placeholder="AIzaSy...">
                    </div>
                    <div class="form-group">
                        <label for="openaiKey">OpenAI API Key</label>
                        <input type="password" id="openaiKey" placeholder="sk-...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="framework">フレームワーク/ライブラリ</label>
                    <input type="text" id="framework" placeholder="例: Discord.py, Spring Boot, Bukkit">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="startGeneration()" id="startBtn">🚀 生成開始</button>
                    <button class="btn-secondary" onclick="resetForm()">🔄 リセット</button>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="cycleCount">0</div>
                        <div class="stat-label">サイクル</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="discussionCount">0</div>
                        <div class="stat-label">議論数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="testCount">0</div>
                        <div class="stat-label">テスト</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="iterations">0/50</div>
                        <div class="stat-label">進度</div>
                    </div>
                </div>
            </div>

            <!-- 中央パネル：議論 -->
            <div class="discussion-panel">
                <h2>💬 マルチAI議論</h2>
                <div class="cycle-counter">サイクル: <span id="cycleBadge">0</span> / 50</div>
                <div class="discussion-scroll" id="discussionContainer"></div>
            </div>
        </div>

        <!-- チャットパネル -->
        <div class="chat-panel">
            <h2>💭 継続会話インターフェース</h2>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-group">
                <input type="text" id="chatInput" placeholder="AIに質問を続ける...">
                <button class="btn-primary" onclick="sendChatMessage()">送信</button>
            </div>
        </div>

        <!-- 下段パネル：コード生成 -->
        <div class="code-panel">
            <h2>💻 生成コード</h2>
            <div class="code-output" id="codeOutput">
                <code>コード生成結果がここに表示されます...</code>
            </div>
        </div>

        <!-- データ収集パネル -->
        <div class="data-panel">
            <h2>📊 データ収集・管理</h2>
            <div class="data-source-selector">
                <button class="data-source-btn" onclick="selectDataSource('chrome')">🌐 Chrome データ</button>
                <button class="data-source-btn" onclick="selectDataSource('api')">🔗 API</button>
                <button class="data-source-btn" onclick="selectDataSource('local')">💾 ローカル</button>
                <button class="data-source-btn" onclick="selectDataSource('custom')">⚙️ カスタム</button>
            </div>
            <button class="btn-primary" onclick="collectData()" style="width: 100%; margin-bottom: 10px;">📥 データ収集開始</button>
            <div id="dataTable" style="max-height: 300px; overflow-y: auto;"></div>
        </div>

        <!-- 自動更新パネル -->
        <div class="update-panel">
            <h2>🔄 自動更新システム</h2>
            <div id="updateStatus"></div>
            <div id="testResults" style="max-height: 250px; overflow-y: auto;"></div>
            <button class="btn-primary" onclick="initiateAutoUpdate()" style="width: 100%; margin-top: 10px;">🚀 更新開始（テスト付き）</button>
        </div>

        <!-- ステータスパネル -->
        <div class="status-panel">
            <h2>📊 システムステータス</h2>
            <div id="statusContainer"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="download-section">
                <button class="download-btn" onclick="downloadZip()" id="downloadBtn" disabled>
                    📦 コードをダウンロード (ZIP)
                </button>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // グローバル状態管理
        // =============================================
        const AppState = {
            currentCycle: 0,
            maxCycles: 50,
            discussionItems: [],
            generatedCode: '',
            testResults: [],
            apiKeys: { gemini: '', openai: '' },
            isRunning: false,
            stats: { discussionCount: 0, testCount: 0, cycleCount: 0 },
            previousDiscussions: [],
            chatHistory: [],
            collectedData: [],
            selectedDataSource: 'chrome',
            autoUpdateEnabled: false
        };

        // =============================================
        // IndexedDB セットアップ
        // =============================================
        class DatabaseManager {
            constructor() {
                this.dbName = 'HunyaAIDB';
                this.dbVersion = 1;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('data')) {
                            db.createObjectStore('data', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('conversations')) {
                            db.createObjectStore('conversations', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('updates')) {
                            db.createObjectStore('updates', { keyPath: 'id', autoIncrement: true });
                        }
                    };
                });
            }

            async addData(storeName, data) {
                const transaction = this.db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                return new Promise((resolve, reject) => {
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAllData(storeName) {
                const transaction = this.db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clearStore(storeName) {
                const transaction = this.db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                return new Promise((resolve, reject) => {
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        const dbManager = new DatabaseManager();

        // =============================================
        // チャットインターフェース
        // =============================================
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // ユーザーメッセージを表示
            addChatMessage(message, 'user');
            input.value = '';
            
            // メッセージを保存
            await dbManager.addData('conversations', {
                type: 'user',
                message: message,
                timestamp: new Date().toISOString()
            });
            
            // AI レスポンスをシミュレート
            setTimeout(async () => {
                const aiResponse = await generateAIResponse(message);
                addChatMessage(aiResponse, 'ai');
                
                await dbManager.addData('conversations', {
                    type: 'ai',
                    message: aiResponse,
                    timestamp: new Date().toISOString()
                });
            }, 500);
        }

        function addChatMessage(message, type) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${type}`;
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            AppState.chatHistory.push({ type, message, timestamp: new Date() });
        }

        async function generateAIResponse(userMessage) {
            const responses = [
                'その質問について詳しく説明することができます。コードの最適化、パフォーマンスの改善について何かお手伝いできることはありますか？',
                'それは興味深い質問ですね。現在のコード生成結果に対してどのような変更や改善をしたいですか？',
                'ご質問ありがとうございます。より詳しい情報が必要な場合は、プロジェクト説明を更新してください。',
                'そのアプローチは良い考えですね。実装戦略についてさらに詳しく説明することもできます。'
            ];
            return responses[Math.floor(Math.random() * responses.length)];
        }

        // =============================================
        // データ収集機能
        // =============================================
        function selectDataSource(source) {
            AppState.selectedDataSource = source;
            
            document.querySelectorAll('.data-source-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            addChatMessage(`💻 データソース "${source}" を選択しました。`, 'system');
        }

        async function collectData() {
            addChatMessage('📥 データ収集を開始します...', 'system');
            
            try {
                let collectedItems = [];
                
                if (AppState.selectedDataSource === 'chrome') {
                    collectedItems = await collectChromeData();
                } else if (AppState.selectedDataSource === 'api') {
                    collectedItems = await collectAPIData();
                } else if (AppState.selectedDataSource === 'local') {
                    collectedItems = await collectLocalData();
                } else if (AppState.selectedDataSource === 'custom') {
                    collectedItems = await collectCustomData();
                }
                
                // データベースに保存
                for (const item of collectedItems) {
                    await dbManager.addData('data', item);
                }
                
                AppState.collectedData = [...AppState.collectedData, ...collectedItems];
                
                displayDataTable();
                addChatMessage(`✅ ${collectedItems.length} 件のデータを収集・保存しました。`, 'system');
                
            } catch (error) {
                addChatMessage(`❌ データ収集エラー: ${error.message}`, 'system');
            }
        }

        async function collectChromeData() {
            // Chrome Storage API シミュレーション
            return [
                { id: 1, source: 'chrome', type: 'browsing_history', content: 'GitHub repo visits', timestamp: new Date() },
                { id: 2, source: 'chrome', type: 'bookmarks', content: 'Saved technical articles', timestamp: new Date() },
                { id: 3, source: 'chrome', type: 'local_storage', content: 'App preferences', timestamp: new Date() }
            ];
        }

        async function collectAPIData() {
            return [
                { id: 4, source: 'api', type: 'external_api', content: 'GitHub API - public repos', timestamp: new Date() },
                { id: 5, source: 'api', type: 'rest_api', content: 'Latest coding trends', timestamp: new Date() }
            ];
        }

        async function collectLocalData() {
            return [
                { id: 6, source: 'local', type: 'file_system', content: 'Project files analysis', timestamp: new Date() },
                { id: 7, source: 'local', type: 'cache', content: 'Generated code templates', timestamp: new Date() }
            ];
        }

        async function collectCustomData() {
            return [
                { id: 8, source: 'custom', type: 'user_input', content: 'Custom project requirements', timestamp: new Date() },
                { id: 9, source: 'custom', type: 'metadata', content: 'Framework preferences', timestamp: new Date() }
            ];
        }

        function displayDataTable() {
            const allData = AppState.collectedData;
            const tableDiv = document.getElementById('dataTable');
            
            let html = '<table class="data-table"><thead><tr><th>ソース</th><th>タイプ</th><th>内容</th><th>時刻</th></tr></thead><tbody>';
            
            allData.forEach(item => {
                html += `<tr>
                    <td>${item.source}</td>
                    <td>${item.type}</td>
                    <td>${item.content}</td>
                    <td>${new Date(item.timestamp).toLocaleTimeString()}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            tableDiv.innerHTML = html;
        }

        // =============================================
        // 自動更新システム（マルチAIテスト付き）
        // =============================================
        async function initiateAutoUpdate() {
            if (!AppState.generatedCode) {
                addChatMessage('⚠️ 更新するコードが生成されていません。', 'system');
                return;
            }

            AppState.autoUpdateEnabled = true;
            updateUpdateStatus('更新プロセスを開始しています...', 'pending');
            
            try {
                // ステップ 1: 複数AIでテスト
                updateUpdateStatus('複数AIによるテストを実行中...', 'pending');
                const testResults = await runMultiAITests(AppState.generatedCode);
                
                displayTestResults(testResults);
                
                // すべてのテストがパスしたか確認
                const allPassed = testResults.every(result => result.status === 'PASS');
                
                if (allPassed) {
                    updateUpdateStatus('✅ すべてのテストが成功しました！', 'success');
                    
                    // ステップ 2: GitHub へプッシュ
                    updateUpdateStatus('GitHub リポジトリへのコミットを準備中...', 'pending');
                    await simulateGitHubPush();
                    
                    updateUpdateStatus('🎉 自動更新が完了しました！', 'success');
                    addChatMessage('✅ コードが自動更新され、GitHub にコミットされました。', 'system');
                } else {
                    updateUpdateStatus('❌ テストが失敗しました。修正が必要です。', 'error');
                    addChatMessage('テスト失敗：' + testResults.filter(r => r.status === 'FAIL').map(r => r.test).join(', '), 'system');
                }
                
            } catch (error) {
                updateUpdateStatus(`❌ エラー: ${error.message}`, 'error');
                addChatMessage(`更新エラー: ${error.message}`, 'system');
            }
        }

        async function runMultiAITests(code) {
            const tests = [
                { name: '構文検証', test: 'syntax-check' },
                { name: 'パフォーマンステスト', test: 'performance' },
                { name: 'セキュリティスキャン', test: 'security' },
                { name: 'コード品質チェック', test: 'code-quality' },
                { name: 'ユニットテスト', test: 'unit-tests' }
            ];

            const results = [];

            for (const test of tests) {
                // シミュレートされたテスト実行
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const passed = Math.random() > 0.2; // 80% success rate
                results.push({
                    test: test.name,
                    status: passed ? 'PASS' : 'FAIL',
                    details: passed ? '✓ テスト成功' : '✗ テスト失敗'
                });

                AppState.stats.testCount++;
                document.getElementById('testCount').textContent = AppState.stats.testCount;
            }

            await dbManager.addData('updates', {
                timestamp: new Date(),
                results: results,
                status: results.every(r => r.status === 'PASS') ? 'SUCCESS' : 'FAILED'
            });

            return results;
        }

        function displayTestResults(results) {
            const testResultsDiv = document.getElementById('testResults');
            let html = '';
            
            results.forEach(result => {
                html += `<div class="test-result ${result.status === 'PASS' ? 'pass' : 'fail'}">
                    <strong>${result.test}:</strong> ${result.details}
                </div>`;
            });
            
            testResultsDiv.innerHTML = html;
        }

        function updateUpdateStatus(message, status) {
            const statusDiv = document.getElementById('updateStatus');
            statusDiv.innerHTML = `<div class="update-status ${status}">${message}</div>`;
        }

        async function simulateGitHubPush() {
            return new Promise(resolve => {
                setTimeout(() => {
                    console.log('GitHub にコミット:', {
                        message: 'Auto-update: Improved code generation with multi-AI validation',
                        code: AppState.generatedCode,
                        timestamp: new Date()
                    });
                    resolve();
                }, 2000);
            });
        }

        // =============================================
        // 初期化
        // =============================================
        async function init() {
            await dbManager.init();
            addChatMessage('👋 HunyaCodingAI へようこそ！何かお手伝いできることはありますか？', 'system');
        }

        window.addEventListener('DOMContentLoaded', init);

        // =============================================
        // ユーティリティ関数
        // =============================================
        function resetForm() {
            document.getElementById('userRequest').value = '';
            document.getElementById('language').value = 'python';
            document.getElementById('framework').value = '';
            document.getElementById('geminiKey').value = '';
            document.getElementById('openaiKey').value = '';
        }

        async function startGeneration() {
            const userRequest = document.getElementById('userRequest').value.trim();
            if (!userRequest) {
                alert('プロジェクト説明を入力してください');
                return;
            }

            AppState.generatedCode = `// Auto-generated code at ${new Date().toLocaleTimeString()}\n// Request: ${userRequest}`;
            document.getElementById('codeOutput').innerHTML = `<code>${AppState.generatedCode}</code>`;
            
            addChatMessage(`📝 リクエストを処理中: "${userRequest.substring(0, 50)}..."`, 'system');
            setTimeout(() => {
                addChatMessage('✅ コード生成が完了しました！', 'system');
            }, 1000);
        }

        async function downloadZip() {
            alert('ZIP ダウンロード機能');
        }

        // Keyboard support for chat
        document.addEventListener('DOMContentLoaded', () => {
            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        sendChatMessage();
                    }
                });
            }
        });

    </script>
