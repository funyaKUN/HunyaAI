<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HunyaCodingAI - マルチレイヤーAIコード生成システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-panel, .discussion-panel, .code-panel, .status-panel, .chat-panel, .data-panel, .update-panel, .ai-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
            animation: fadeIn 0.6s ease-out;
        }

        .input-panel {
            animation-delay: 0.1s;
        }

        .discussion-panel {
            grid-column: 2;
            grid-row: 1 / 3;
            animation-delay: 0.2s;
        }

        .code-panel {
            animation-delay: 0.3s;
        }

        .status-panel {
            animation-delay: 0.4s;
        }

        .chat-panel {
            grid-column: 1;
            animation-delay: 0.5s;
            max-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .data-panel {
            animation-delay: 0.6s;
        }

        .update-panel {
            animation-delay: 0.7s;
        }

        .ai-panel {
            animation-delay: 0.8s;
        }

        h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .config-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .discussion-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            animation: slideInLeft 0.4s ease-out;
            font-size: 0.9em;
        }

        .discussion-item.gemini {
            border-left-color: #ea4335;
        }

        .discussion-item.openai {
            border-left-color: #10a37f;
        }

        .discussion-item.custom {
            border-left-color: #764ba2;
        }

        .discussion-item.synthesis {
            border-left-color: #f7b801;
            background: #fffbf0;
        }

        .ai-name {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.85em;
        }

        .discussion-item.gemini .ai-name {
            color: #ea4335;
        }

        .discussion-item.openai .ai-name {
            color: #10a37f;
        }

        .discussion-item.custom .ai-name {
            color: #764ba2;
        }

        .discussion-item.synthesis .ai-name {
            color: #f7b801;
        }

        .discussion-content {
            color: #555;
            font-size: 0.9em;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
        }

        .discussion-scroll {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .code-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .code-output code {
            color: #d4d4d4;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .status-indicator.pending {
            background: #ffc107;
            animation: pulse 1.5s infinite;
        }

        .status-indicator.success {
            background: #28a745;
        }

        .status-indicator.error {
            background: #dc3545;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        /* Chat Interface Styles */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            background: #f8f9fa;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
            animation: slideInLeft 0.3s ease-out;
        }

        .chat-message.user {
            background: #e3f2fd;
            text-align: right;
            color: #1565c0;
        }

        .chat-message.ai {
            background: #f3e5f5;
            text-align: left;
            color: #6a1b9a;
        }

        .chat-message.system {
            background: #fff3e0;
            text-align: center;
            color: #e65100;
            font-size: 0.85em;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
        }

        .chat-input-group input {
            flex: 1;
        }

        .chat-input-group button {
            width: 40px;
            padding: 12px;
        }

        /* AI Analysis Panel */
        .ai-analysis {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .ai-analysis h4 {
            color: #667eea;
            font-size: 0.95em;
            margin-bottom: 8px;
        }

        .ai-analysis-item {
            font-size: 0.85em;
            color: #555;
            margin-bottom: 6px;
            padding: 6px 0;
        }

        .ai-score {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
        }

        /* Data Panel Styles */
        .data-source-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .data-source-btn {
            padding: 10px;
            background: #e0e0e0;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .data-source-btn.active {
            background: #667eea;
            color: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        .data-table th, .data-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table th {
            background: #667eea;
            color: white;
        }

        /* Update Panel Styles */
        .update-status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .update-status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .update-status.success {
            background: #d4edda;
            color: #155724;
        }

        .update-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .test-result {
            padding: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .test-result.pass {
            border-left-color: #28a745;
        }

        .test-result.fail {
            border-left-color: #dc3545;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .download-section {
            text-align: center;
            margin-top: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .download-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .discussion-panel {
                grid-column: 1;
                grid-row: auto;
            }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .cycle-counter {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .thinking-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #764ba2;
            margin-right: 5px;
            animation: thinkingPulse 0.6s infinite;
        }

        @keyframes thinkingPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 HunyaCodingAI - EnhancedAI Edition</h1>
            <p>高度なマルチレイヤーAIシステム - 完全クライアントサイド実装（拡張AIエンジン搭載）</p>
        </header>

        <div class="main-grid">
            <!-- 左パネル：入力 -->
            <div class="input-panel">
                <h2>📝 リクエスト入力</h2>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <div class="form-group">
                    <label for="userRequest">プロジェクト説明</label>
                    <textarea id="userRequest" placeholder="例: Minecraftのスポーン位置管理プラグインを作りたい&#10;ユーザーがコマンドで好きな位置をセット&#10;データは永続化して欲しい"></textarea>
                </div>

                <div class="form-group">
                    <label for="language">プログラミング言語</label>
                    <select id="language">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                        <option value="typescript">TypeScript</option>
                        <option value="csharp">C#</option>
                        <option value="cpp">C++</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="framework">フレームワーク/ライブラリ</label>
                    <input type="text" id="framework" placeholder="例: Discord.py, Spring Boot, Bukkit">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="startGeneration()" id="startBtn">🚀 生成開始</button>
                    <button class="btn-secondary" onclick="resetForm()">🔄 リセット</button>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="cycleCount">0</div>
                        <div class="stat-label">サイクル</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="discussionCount">0</div>
                        <div class="stat-label">議論数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="testCount">0</div>
                        <div class="stat-label">テスト</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="iterations">0/50</div>
                        <div class="stat-label">進度</div>
                    </div>
                </div>
            </div>

            <!-- 中央パネル：AI議論 -->
            <div class="discussion-panel">
                <h2>💬 マルチAI議論エンジン</h2>
                <div class="cycle-counter">サイクル: <span id="cycleBadge">0</span> / 50</div>
                <div class="discussion-scroll" id="discussionContainer"></div>
            </div>
        </div>

        <!-- AI強化パネル -->
        <div class="ai-panel">
            <h2>🧠 AI分析・パターン認識</h2>
            <div id="aiAnalysisContainer"></div>
            <button class="btn-primary" onclick="analyzeWithAI()" style="width: 100%; margin-top: 10px;">🔍 AI分析を実行</button>
        </div>

        <!-- チャットパネル -->
        <div class="chat-panel">
            <h2>💭 継続会話インターフェース</h2>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-group">
                <input type="text" id="chatInput" placeholder="AIに質問を続ける...">
                <button class="btn-primary" onclick="sendChatMessage()">送信</button>
            </div>
        </div>

        <!-- 下段パネル：コード生成 -->
        <div class="code-panel">
            <h2>💻 生成コード</h2>
            <div class="code-output" id="codeOutput">
                <code>コード生成結果がここに表示されます...</code>
            </div>
        </div>

        <!-- データ収集パネル -->
        <div class="data-panel">
            <h2>📊 スマートデータ収集</h2>
            <div class="data-source-selector">
                <button class="data-source-btn" onclick="selectDataSource('semantic')">🧠 セマンティック</button>
                <button class="data-source-btn" onclick="selectDataSource('pattern')">🔗 パターン分析</button>
                <button class="data-source-btn" onclick="selectDataSource('local')">💾 ローカル</button>
                <button class="data-source-btn" onclick="selectDataSource('learned')">📚 学習済みデータ</button>
            </div>
            <button class="btn-primary" onclick="collectIntelligentData()" style="width: 100%; margin-bottom: 10px;">📥 スマート収集</button>
            <div id="dataTable" style="max-height: 300px; overflow-y: auto;"></div>
        </div>

        <!-- 自動更新パネル -->
        <div class="update-panel">
            <h2>🔄 自動更新システム</h2>
            <div id="updateStatus"></div>
            <div id="testResults" style="max-height: 250px; overflow-y: auto;"></div>
            <button class="btn-primary" onclick="initiateAutoUpdate()" style="width: 100%; margin-top: 10px;">🚀 更新開始</button>
        </div>

        <!-- ステータスパネル -->
        <div class="status-panel">
            <h2>📊 システムステータス</h2>
            <div id="statusContainer"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="download-section">
                <button class="download-btn" onclick="downloadZip()" id="downloadBtn" disabled>
                    📦 コードをダウンロード (ZIP)
                </button>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // グローバル状態管理
        // =============================================
        const AppState = {
            currentCycle: 0,
            maxCycles: 50,
            discussionItems: [],
            generatedCode: '',
            testResults: [],
            isRunning: false,
            stats: { discussionCount: 0, testCount: 0, cycleCount: 0 },
            chatHistory: [],
            collectedData: [],
            selectedDataSource: 'semantic',
            aiAnalysisResults: null
        };

        // =============================================
        // IndexedDB セットアップ
        // =============================================
        class DatabaseManager {
            constructor() {
                this.dbName = 'HunyaAIDB';
                this.dbVersion = 1;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('data')) {
                            db.createObjectStore('data', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('conversations')) {
                            db.createObjectStore('conversations', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('updates')) {
                            db.createObjectStore('updates', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('aiModels')) {
                            db.createObjectStore('aiModels', { keyPath: 'id', autoIncrement: true });
                        }
                    };
                });
            }

            async addData(storeName, data) {
                const transaction = this.db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                return new Promise((resolve, reject) => {
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAllData(storeName) {
                const transaction = this.db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
        }

        const dbManager = new DatabaseManager();

        // =============================================
        // 高度なセマンティック分析エンジン
        // =============================================
        class SemanticAnalysisEngine {
            constructor() {
                this.semanticPatterns = new Map();
                this.contextMemory = [];
                this.patternFrequency = new Map();
                this.initializeSemanticPatterns();
            }

            initializeSemanticPatterns() {
                // セマンティックパターンライブラリ
                this.semanticPatterns.set('user-interaction', {
                    keywords: ['command', 'user', 'input', 'event', 'trigger', 'click', 'action'],
                    complexity: 'medium',
                    category: 'UI/UX'
                });

                this.semanticPatterns.set('data-persistence', {
                    keywords: ['database', 'storage', 'persist', 'save', 'load', 'cache', 'file'],
                    complexity: 'high',
                    category: 'Data Management'
                });

                this.semanticPatterns.set('async-operations', {
                    keywords: ['async', 'parallel', 'concurrent', 'thread', 'background', 'queue', 'task'],
                    complexity: 'high',
                    category: 'Performance'
                });

                this.semanticPatterns.set('error-handling', {
                    keywords: ['error', 'exception', 'validation', 'try', 'catch', 'recover', 'fallback'],
                    complexity: 'medium',
                    category: 'Reliability'
                });

                this.semanticPatterns.set('security', {
                    keywords: ['security', 'auth', 'permission', 'token', 'encrypt', 'validate', 'sanitize'],
                    complexity: 'high',
                    category: 'Security'
                });

                this.semanticPatterns.set('api-integration', {
                    keywords: ['api', 'integration', 'external', 'webhook', 'endpoint', 'request', 'response'],
                    complexity: 'medium',
                    category: 'Integration'
                });

                this.semanticPatterns.set('real-time', {
                    keywords: ['real-time', 'live', 'streaming', 'socket', 'websocket', 'push', 'notification'],
                    complexity: 'high',
                    category: 'Real-time'
                });

                this.semanticPatterns.set('scalability', {
                    keywords: ['scale', 'performance', 'optimize', 'load', 'distribute', 'cluster', 'microservice'],
                    complexity: 'very-high',
                    category: 'Architecture'
                });
            }

            analyzeRequest(userRequest, language) {
                const lowerRequest = userRequest.toLowerCase();
                const analysis = {
                    detectedPatterns: [],
                    estimatedComplexity: 0,
                    recommendedArchitecture: [],
                    requiredLibraries: [],
                    riskFactors: [],
                    estimatedImplementationTime: 0,
                    semanticScore: 0
                };

                // パターン検出
                this.semanticPatterns.forEach((pattern, key) => {
                    const matchScore = pattern.keywords.filter(kw => lowerRequest.includes(kw)).length;
                    if (matchScore > 0) {
                        analysis.detectedPatterns.push({
                            name: key,
                            matchScore: matchScore,
                            complexity: pattern.complexity,
                            category: pattern.category
                        });
                    }
                });

                // 複雑度計算
                analysis.detectedPatterns.forEach(pattern => {
                    const complexityMap = { 'low': 1, 'medium': 2, 'high': 3, 'very-high': 4 };
                    analysis.estimatedComplexity += complexityMap[pattern.complexity] || 1;
                });

                // 推奨アーキテクチャ
                if (analysis.detectedPatterns.some(p => p.name === 'scalability')) {
                    analysis.recommendedArchitecture.push('Microservices', 'Event-Driven');
                }
                if (analysis.detectedPatterns.some(p => p.name === 'real-time')) {
                    analysis.recommendedArchitecture.push('WebSocket-based', 'Event Bus');
                }
                if (analysis.detectedPatterns.some(p => p.name === 'data-persistence')) {
                    analysis.recommendedArchitecture.push('Layered Architecture');
                }

                // リスク評価
                if (analysis.estimatedComplexity > 8) {
                    analysis.riskFactors.push('High complexity - rigorous testing required');
                }
                if (analysis.detectedPatterns.some(p => p.name === 'security')) {
                    analysis.riskFactors.push('Security considerations - use established libraries');
                }

                // 言語別推奨ライブラリ
                analysis.requiredLibraries = this.recommendLibraries(language, analysis.detectedPatterns);

                // セマンティックスコア（0-100）
                analysis.semanticScore = Math.min(100, analysis.detectedPatterns.length * 15 + analysis.estimatedComplexity * 5);

                return analysis;
            }

            recommendLibraries(language, patterns) {
                const libraries = {
                    python: ['asyncio', 'pydantic', 'SQLAlchemy', 'pytest', 'logging'],
                    javascript: ['async/await', 'typescript', 'jest', 'axios', 'express'],
                    java: ['Spring', 'JUnit', 'Log4j', 'Lombok', 'Gson'],
                    typescript: ['NestJS', 'TypeORM', 'Jest', 'class-validator'],
                    csharp: ['.NET Core', 'Entity Framework', 'xUnit', 'Serilog'],
                    cpp: ['Boost', 'nlohmann/json', 'spdlog', 'googletest']
                };

                let recommended = libraries[language] || [];

                // パターンに基づいて追加推奨
                patterns.forEach(pattern => {
                    if (pattern.name === 'async-operations' && language === 'python') {
                        recommended.push('aiohttp', 'aiomultiprocess');
                    }
                    if (pattern.name === 'data-persistence' && language === 'python') {
                        recommended.push('pymongo', 'redis');
                    }
                });

                return [...new Set(recommended)];
            }
        }

        // =============================================
        // パターン認識・学習エンジン
        // =============================================
        class PatternRecognitionEngine {
            constructor() {
                this.patterns = new Map();
                this.learningData = [];
                this.codePatterns = new Map();
                this.initializePatterns();
            }

            initializePatterns() {
                this.codePatterns.set('singleton', {
                    description: 'Singleton Pattern - Single instance management',
                    languages: ['java', 'python', 'csharp', 'cpp'],
                    useCases: ['Logger', 'Database Connection', 'Configuration Manager'],
                    complexity: 'low'
                });

                this.codePatterns.set('observer', {
                    description: 'Observer Pattern - Event notification system',
                    languages: ['javascript', 'python', 'java', 'typescript'],
                    useCases: ['Event Listeners', 'Real-time Updates', 'Reactive Systems'],
                    complexity: 'medium'
                });

                this.codePatterns.set('factory', {
                    description: 'Factory Pattern - Object creation abstraction',
                    languages: ['java', 'python', 'csharp', 'cpp'],
                    useCases: ['Plugin System', 'Database Adapters', 'Data Parsers'],
                    complexity: 'medium'
                });

                this.codePatterns.set('async-await', {
                    description: 'Async/Await Pattern - Asynchronous operations',
                    languages: ['javascript', 'python', 'csharp', 'typescript'],
                    useCases: ['API Calls', 'File I/O', 'Database Queries'],
                    complexity: 'medium'
                });

                this.codePatterns.set('dependency-injection', {
                    description: 'Dependency Injection - Loose coupling',
                    languages: ['java', 'csharp', 'typescript', 'python'],
                    useCases: ['Testing', 'Modularity', 'Configuration'],
                    complexity: 'high'
                });

                this.codePatterns.set('middleware', {
                    description: 'Middleware Pattern - Request/Response processing',
                    languages: ['javascript', 'python', 'java'],
                    useCases: ['Authentication', 'Logging', 'Error Handling'],
                    complexity: 'medium'
                });
            }

            recognizePatterns(code, language) {
                const detectedPatterns = [];
                
                this.codePatterns.forEach((pattern, key) => {
                    if (pattern.languages.includes(language)) {
                        if (this.matchesPattern(code, key)) {
                            detectedPatterns.push({
                                name: key,
                                description: pattern.description,
                                confidence: Math.random() * 0.4 + 0.6, // 60-100%
                                complexity: pattern.complexity,
                                suggestions: pattern.useCases
                            });
                        }
                    }
                });

                return detectedPatterns;
            }

            matchesPattern(code, patternName) {
                const patternKeywords = {
                    'singleton': ['getInstance', 'instance', '__new__', 'static'],
                    'observer': ['addEventListener', 'subscribe', 'notify', 'update'],
                    'factory': ['create', 'make', 'build', 'construct'],
                    'async-await': ['async', 'await', 'Promise', 'then'],
                    'dependency-injection': ['inject', 'constructor', 'container', '@'],
                    'middleware': ['use', 'handler', 'next', 'chain']
                };

                const keywords = patternKeywords[patternName] || [];
                return keywords.some(kw => code.toLowerCase().includes(kw));
            }
        }

        // =============================================

        const semanticEngine = new SemanticAnalysisEngine();
        const patternEngine = new PatternRecognitionEngine();

        async function generateIntelligentResponse(userMessage) {
            const responses = {
                code: [
                    '💡 コード最適化の提案: このロジックはさらに効率化できます。',
                    '🔍 コード品質: 現在のコードは標準を満たしています。'

                architecture: [
                    '🏗️ アーキテクチャ提案: マイクロサービス構成を検討してください。',
                    '📐 システム設計: 層状アーキテクチャが推奨されます。'
                ],
                performance: [
                    '⚡ パフォーマンス最適化: キャッシング戦略を実装してください。',
                    '📊 ベンチマーク: 現在のパフォーマンスは良好です。'
                ],
                security: [
                    '🔒 セキュリティ: 入力検証を強化してください。',
                    '🛡️ 認証: JWT トークンベースの認証を推奨します。'
                ],
                default: [
                    '✅ ご質問ありがとうございます。詳細情報が必要な場合は、プロジェクト説明を更新してください。',
                    '🤖 分析完了。追加の改善提案があります。'
                ]
            };

            let category = 'default';
            if (userMessage.toLowerCase().includes('code') || userMessage.toLowerCase().includes('コード')) {
                category = 'code';
            } else if (userMessage.toLowerCase().includes('architecture') || userMessage.toLowerCase().includes('アーキテクチャ')) {
                category = 'architecture';
            } else if (userMessage.toLowerCase().includes('performance') || userMessage.toLowerCase().includes('パフォーマンス')) {
                category = 'performance';
            } else if (userMessage.toLowerCase().includes('security') || userMessage.toLowerCase().includes('セキュリティ')) {
                category = 'security';
            }

            const categoryResponses = responses[category];
            return categoryResponses[Math.floor(Math.random() * categoryResponses.length)];
        }

        function addChatMessage(message, type) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${type}`;
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            AppState.chatHistory.push({ type, message, timestamp: new Date() });

        // =============================================
        // 自動更新システム
        // =============================================
        async function initiateAutoUpdate() {
            if (!AppState.generatedCode) {
                addChatMessage('⚠️ 更新するコードが生成されていません。', 'system');
                return;
            }

            updateUpdateStatus('マルチAIテストを実行中...', 'pending');
            
            try {
                const testResults = await runAdvancedTests(AppState.generatedCode);
                displayTestResults(testResults);

                const allPassed = testResults.every(result => result.status === 'PASS');
                
                if (allPassed) {
                    updateUpdateStatus('✅ すべてのテストが成功！GitHub へコミット中...', 'success');
                    await simulateGitHubPush();
                    updateUpdateStatus('🎉 自動更新が完了しました！', 'success');
                    addChatMessage('✅ コードが自動更新されました。', 'system');
                } else {
                    updateUpdateStatus('❌ テストが失敗しました。', 'error');
                }
                
            } catch (error) {
                updateUpdateStatus(`❌ エラー: ${error.message}`, 'error');
            }
        }

        async function runAdvancedTests(code) {
            const tests = [
                { name: '構文検証', test: 'syntax' },
                { name: 'セマンティック検証', test: 'semantic' },
                { name: 'パターン適合性', test: 'pattern' },
                { name: 'パフォーマンス', test: 'performance' },
                { name: 'セキュリティ', test: 'security' }
            ];

            const results = [];

            for (const test of tests) {
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const passed = Math.random() > 0.15; // 85% success rate
                results.push({
                    test: test.name,
                    status: passed ? 'PASS' : 'FAIL',
                    details: passed ? '✓ テスト成功' : '✗ テスト失敗'
                });

                AppState.stats.testCount++;
            }

            await dbManager.addData('updates', {
                timestamp: new Date(),
                results: results,
                status: results.every(r => r.status === 'PASS') ? 'SUCCESS' : 'FAILED'
            });

            return results;
        }

        function displayTestResults(results) {
            const testResultsDiv = document.getElementById('testResults');
            let html = '';
            
            results.forEach(result => {
                html += `<div class="test-result ${result.status === 'PASS' ? 'pass' : 'fail'}">
                    <strong>${result.test}:</strong> ${result.details}
                </div>`;
            });
            
            testResultsDiv.innerHTML = html;
        }

        function updateUpdateStatus(message, status) {
            const statusDiv = document.getElementById('updateStatus');
            statusDiv.innerHTML = `<div class="update-status ${status}">${message}</div>`;
        }

        async function simulateGitHubPush() {
            return new Promise(resolve => {
                setTimeout(() => {
                    console.log('GitHub にコミット:', {
                        message: 'Auto-update: Enhanced AI analysis with semantic and pattern recognition',
                        timestamp: new Date()
                    });
                    resolve();
                }, 2000);
            });
        }
